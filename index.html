<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日吃啥 - 多人联机版</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,'Microsoft YaHei'}
        body{background:#f5f7fa;padding:20px;max-width:500px;margin:0 auto}
        .page{display:none}
        .page.active{display:block}
        .card{background:white;border-radius:12px;padding:16px;margin:12px 0;box-shadow:0 2px 10px #00000010}
        .btn{padding:10px 14px;background:#42b983;color:white;border:none;border-radius:8px;margin:5px;cursor:pointer}
        .btn-danger{background:#f56c6c}
        input,select{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
        .title{font-size:18px;font-weight:bold;margin-bottom:10px}
        .item{padding:8px 0;border-bottom:1px solid #f0f0f0}
        .nav{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
    </style>
</head>
<body>

<div class="nav">
    <button class="btn" onclick="go('home')">首页</button>
    <button class="btn" onclick="go('menu')">我的菜单</button>
    <button class="btn" onclick="go('order')">随机点餐</button>
    <button class="btn" onclick="go('group')">群组</button>
</div>

<!-- 首页 -->
<div id="home" class="page active">
    <div class="card">
        <div class="title">🍚 今日吃啥（联机版）</div>
        <p>支持多人同步、群组点餐</p>
    </div>
</div>

<!-- 菜单 -->
<div id="menu" class="page">
    <div class="card">
        <div class="title">我的菜单</div>
        <input id="food" placeholder="输入菜名">
        <button class="btn" onclick="addFood()">添加</button>
        <div id="foodList"></div>
    </div>
</div>

<!-- 随机点餐 -->
<div id="order" class="page">
    <div class="card">
        <div class="title">随机点餐</div>
        <input type="number" id="num" value="1" min="1">
        <button class="btn" onclick="rand()">随机</button>
        <button class="btn" onclick="order()">确认下单</button>
        <div id="result"></div>
    </div>
</div>

<!-- 群组（多人联机） -->
<div id="group" class="page">
    <div class="card">
        <div class="title>群组</div>
        <input id="gname" placeholder="群名">
        <button class="btn" onclick="createGroup()">创建群</button>
        <input id="gid" placeholder="输入群ID加入">
        <button class="btn" onclick="joinGroup()">加入群</button>
    </div>
    <div class="card" id="groupInfo" style="display:none">
        <div id="gTitle"></div>
        <input id="gFood" placeholder="群主添加菜">
        <button class="btn" onclick="addGFood()">添加</button>
        <div id="gFoodList"></div>
        <button class="btn" onclick="gRand()">群随机</button>
        <button class="btn" onclick="gOrder()">群下单</button>
        <div id="gResult"></div>
        <div class="title">点餐汇总</div>
        <div id="gSummary"></div>
    </div>
</div>

<script>
// 后端接口地址（部署后我会告诉你填这里）
const API = "https://你的免费域名.onrender.com"

let user = localStorage.getItem("user") || "user"+Date.now()
localStorage.setItem("user",user)

let currentGroup = null

function go(p){
    document.querySelectorAll(".page").forEach(i=>i.classList.remove("active"))
    document.getElementById(p).classList.add("active")
}

// 菜单
async function addFood(){
    let n = document.getElementById("food").value
    await fetch(API+"/add",{method:"POST",body:JSON.stringify({user,name:n})})
    loadFood()
}
async function loadFood(){
    let r = await fetch(API+"/food?user="+user)
    let d = await r.json()
    let l = document.getElementById("foodList")
    l.innerHTML = d.map(i=>`<div class="item">${i.name}</div>`).join("")
}

// 随机
async function rand(){
    let r = await fetch(API+"/food?user="+user)
    let d = await r.json()
    let n = document.getElementById("num").value
    let list = d.sort(()=>Math.random()-0.5).slice(0,n)
    document.getElementById("result").innerHTML = list.map(i=>`<div class="item">${i.name}</div>`).join("")
    sessionStorage.tmp = JSON.stringify(list)
}
async function order(){
    let list = JSON.parse(sessionStorage.tmp||"[]")
    await fetch(API+"/order",{method:"POST",body:JSON.stringify({user,list:list.map(i=>i.name)})})
    alert("下单成功")
}

// 群组
async function createGroup(){
    let name = document.getElementById("gname").value
    let r = await fetch(API+"/create_group",{
        method:"POST",body:JSON.stringify({name,owner:user})
    })
    let d = await r.json()
    currentGroup = d.id
    alert("群ID："+d.id)
    loadGroup()
}
async function joinGroup(){
    currentGroup = document.getElementById("gid").value
    loadGroup()
}
async function loadGroup(){
    if(!currentGroup)return
    let r = await fetch(API+"/group?id="+currentGroup)
    let d = await r.json()
    document.getElementById("groupInfo").style.display="block"
    document.getElementById("gTitle").innerText = d.name
    let fl = document.getElementById("gFoodList")
    fl.innerHTML = d.foods?.map(i=>`<div class="item">${i}</div>`).join("")||""
    loadSummary()
}
async function addGFood(){
    let n = document.getElementById("gFood").value
    await fetch(API+"/group_food",{
        method:"POST",body:JSON.stringify({gid:currentGroup,name:n,owner:user})
    })
    loadGroup()
}
async function gRand(){
    let r = await fetch(API+"/group?id="+currentGroup)
    let d = await r.json()
    let list = d.foods.sort(()=>Math.random()-0.5).slice(0,1)
    document.getElementById("gResult").innerHTML = list.map(i=>`<div class="item">${i}</div>`).join("")
    sessionStorage.gtmp = JSON.stringify(list)
}
async function gOrder(){
    let list = JSON.parse(sessionStorage.gtmp||"[]")
    await fetch(API+"/group_order",{
        method:"POST",body:JSON.stringify({gid:currentGroup,user,list:list.map(i=>i)})
    })
    alert("群下单成功")
    loadSummary()
}
async function loadSummary(){
    let r = await fetch(API+"/group_summary?id="+currentGroup)
    let d = await r.json()
    let s = document.getElementById("gSummary")
    s.innerHTML = d.map(i=>`<div class="item">${i.user}：${i.list.join("、")}</div>`).join("")
}

go("home")
loadFood()
</script>
</body>
</html>
